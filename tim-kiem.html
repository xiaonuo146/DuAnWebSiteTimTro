<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm phòng trọ - NhaTroSV</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="dau-trang">
        <div class="khung-chua">
            <nav class="thanh-dieu-huong">
                <a href="index.html" class="logo">
                    <span>🏠 NhaTroSV</span>
                </a>
                <ul class="menu" id="thanh-menu">
                    <li><a href="index.html" class="menu__link">Trang chủ</a></li>
                    <li><a href="ban-do.html" class="menu__link">Bản đồ</a></li>
                    <li><a href="tim-kiem.html" class="menu__link active">Tìm kiếm</a></li>
                    <li class="muc-menu-mobile"><a href="dang-tin.html" class="menu__link">Đăng tin trọ</a></li>
                </ul>
                <div class="hanh-dong">
                    <a href="dang-tin.html" class="btn btn--landlord nut-dang-tin-desktop">Đăng tin trọ</a>
                    <button class="nut-menu-hamburger" id="nut-hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ==================== TRANG TÌM KIẾM CHÍNH ==================== -->
    <div class="trang-tim-kiem">
        <aside class="thanh-loc">
            <div class="dau-loc">
                <div class="tieu-de-loc">⚙️ Bộ lọc</div>
                <button id="nut-dat-lai" class="nut-dat-lai">Đặt lại</button>
            </div>

            <div class="nhom-loc">
                <label class="nhan-loc">Chọn đường/phố:</label>
                <select id="chon-duong" class="input-select">
                    <option value="all">Tất cả các đường</option>
                    <option value="Y Wang">Đường Y Wang</option>
                    <option value="Lê Duẩn">Đường Lê Duẩn</option>
                    <option value="Giải Phóng">Đường Giải Phóng</option>
                    <option value="Mai Thị Lựu">Đường Mai Thị Lựu</option>
                    <option value="Nguyễn An Ninh">Đường Nguyễn An Ninh</option>
                </select>
            </div>

            <div class="nhom-loc">
                <label class="nhan-loc">Khoảng giá tối thiểu (đ):</label>
                <input type="number" id="loc-gia-thap" class="input-text" value="0">
                
                <label class="nhan-loc" style="margin-top: 10px;">Khoảng giá tối đa (đ):</label>
                <input type="number" id="loc-gia-cao" class="input-text" value="100000000000">
            </div>

            <div class="nhom-loc">
                <label class="nhan-loc">Loại phòng</label>
                <div class="nhom-hop-kiem">
                    <label class="nhan-hop-kiem">
                        <input type="checkbox" value="single" class="loc-loai-phong"> Phòng đơn
                    </label>
                    <label class="nhan-hop-kiem">
                        <input type="checkbox" value="double" class="loc-loai-phong"> Phòng đôi
                    </label>
                </div>
            </div>

            <div class="nhom-loc">
                <label class="nhan-loc">Tiện ích</label>
                <div class="nhom-hop-kiem">
                    <label class="nhan-hop-kiem">
                        <input type="checkbox" value="wifi" class="loc-tien-ich"> Wifi miễn phí
                    </label>
                    <label class="nhan-hop-kiem">
                        <input type="checkbox" value="may_giat" class="loc-tien-ich"> Máy giặt chung
                    </label>
                    <label class="nhan-hop-kiem">
                        <input type="checkbox" value="gac_lung" class="loc-tien-ich"> Gác lửng
                    </label>
                </div>
            </div>
        </aside>

        <main class="noi-dung-ket-qua">
            <div class="khung-ket-qua">
                <div>
                    <h1 id="so-luong-phong" class="tieu-de-ket-qua">Tìm thấy 0 phòng trọ</h1>
                    <p class="khu-vuc-ket-qua">Đại học Tây Nguyên & Lân cận</p>
                </div>

                <div class="thanh-sap-xep">
                    <span class="nhan-sap-xep">Sắp xếp:</span>
                    <select id="sap-xep" class="sap-xep-select">
                        <option value="mac-dinh">Mặc định</option>
                        <option value="gia-tang">Giá thấp đến cao</option>
                        <option value="gia-giam">Giá cao đến thấp</option>
                    </select>
                </div>
            </div>

            <div id="danh-sach-tim-kiem" class="luoi-phong"></div> 

            <template id="mau-card-phong">
                <a href="#" class="card-phong">
                    <div class="card-phong__khung-anh">
                        <div class="card-phong__nhan">Còn phòng</div>
                        <img class="card-phong__anh-that" src="" alt="ảnh phòng" style="display:none;">
                    </div>
                    <div class="card-phong__noi-dung">
                        <h3 class="card-phong__tieu-de">Tiêu đề</h3>
                        <p class="card-phong__dia-chi">📍 Địa chỉ</p>
                        <div class="card-phong__thong-so">
                            <span class="card-phong-dien-tich">📐 0 m²</span>
                            <span class="card-phong-loai-phong">🚪 Phòng đơn</span>
                        </div>
                        <div class="card-phong__vach-ngan"></div>
                        <div class="card-phong__dong-gia">
                            <span class="card-phong__nhan-gia">Giá thuê:</span>
                            <strong class="card-phong__gia">0đ</strong>
                        </div>
                    </div>
                </a>
            </template>
        </main>
    </div>

    <footer class="chan-trang">
        <div class="khung-chua">
            <p>&copy; 2026 NhaTroSV - Kết nối sinh viên với nhà trọ uy tín.</p>
        </div>
    </footer>
</body>
</html>
